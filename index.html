<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Link Bio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --primary: #d1ff4d;
            --primary-dark: #b8e63d;
            --bg: #020b1c;
            --surface: #0a162d;
            --surface-light: #162545;
            --text: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --border: rgba(255, 255, 255, 0.1);
            --radius: 12px;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, var(--surface) 0%, var(--bg) 100%);
            z-index: 1000;
        }

        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .login-card h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        .login-card p { color: var(--text-muted); margin-bottom: 30px; font-size: 14px; }

        /* App Layout */
        #app { display: none; min-height: 100vh; }
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            height: 100vh;
            position: fixed;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
        }

        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }

        .logo { font-size: 20px; font-weight: 800; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--primary); }

        .nav-item {
            padding: 12px 16px;
            border-radius: var(--radius);
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--surface-light);
            color: var(--text);
        }

        .nav-item.active i { color: var(--primary); }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            letter-spacing: 0.02em;
            text-transform: none;
            position: relative;
            overflow: hidden;
        }

        .btn-primary { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
            color: #000;
            box-shadow: 0 4px 15px rgba(209, 255, 77, 0.2);
        }
        .btn-primary:hover { 
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(209, 255, 77, 0.35);
            filter: brightness(1.05);
        }
        .btn-primary:active { transform: translateY(0) scale(0.98); }

        .btn-outline { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid var(--border); 
            color: var(--text);
            backdrop-filter: blur(5px);
        }
        .btn-outline:hover { 
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .btn-danger { 
            background: rgba(239, 68, 68, 0.08); 
            color: #ff5f5f; 
            border: 1px solid rgba(239, 68, 68, 0.15); 
        }
        .btn-danger:hover { 
            background: #ef4444; 
            color: white;
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
            transform: translateY(-1px);
        }

        /* Header */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .page-header h2 { font-size: 28px; font-weight: 800; }

        /* Table/List */
        .client-list { display: grid; gap: 16px; }
        .client-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }
        .client-card:hover { border-color: rgba(255,255,255,0.2); background: var(--surface-light); }

        .client-info { display: flex; align-items: center; gap: 16px; }
        .client-logo { width: 48px; height: 48px; border-radius: 12px; background: #fff; object-fit: contain; padding: 4px; }
        .client-details h3 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .client-details p { font-size: 13px; color: var(--text-muted); }

        .client-status {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .status-active { background: rgba(209, 255, 77, 0.1); color: var(--primary); }
        .status-inactive { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }

        /* Form Controls */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 8px; }
        .form-control {
            width: 100%;
            background: var(--surface-light);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: var(--radius);
            color: var(--text);
            font-family: inherit;
            outline: none;
        }
        .form-control:focus { border-color: var(--primary); }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 40px;
        }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .modal-header h3 { font-size: 24px; font-weight: 800; }
        .close-modal { cursor: pointer; font-size: 20px; color: var(--text-muted); }

        /* Link Management */
        .links-editor { margin-top: 30px; border-top: 1px solid var(--border); pt: 30px; }
        .links-list { display: grid; gap: 10px; margin-bottom: 20px; }
        .link-row {
            display: grid;
            grid-template-columns: 140px 1fr 1fr 1fr 44px;
            gap: 10px;
            align-items: center;
            background: var(--surface-light);
            padding: 10px;
            border-radius: var(--radius);
        }

        /* Color Inputs */
        .color-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .color-picker-wrap { display: flex; align-items: center; gap: 10px; }
        .color-picker-wrap input[type="color"] {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 8px;
            background: none;
            cursor: pointer;
        }

        /* Loading */
        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: none;
            z-index: 3000;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h1>Link Bio Admin</h1>
            <p>Faça login para gerenciar seus clientes.</p>
            <div class="form-group">
                <input type="email" id="login-email" class="form-control" placeholder="E-mail">
            </div>
            <div class="form-group">
                <input type="password" id="login-pass" class="form-control" placeholder="Senha">
            </div>
            <button id="btn-login" class="btn btn-primary" style="width: 100%; justify-content: center;">
                Entrar <div class="loader" id="login-loader"></div>
            </button>
        </div>
    </div>

    <!-- App Shell -->
    <div id="app">
        <aside class="sidebar">
            <div class="logo">
                <i class="fas fa-bolt"></i> LinkBio Admin
            </div>
            <nav>
                <div class="nav-item active" data-view="clients">
                    <i class="fas fa-users"></i> Clientes
                </div>
                <div class="nav-item" data-view="analytics">
                    <i class="fas fa-chart-bar"></i> Analytics
                </div>
            </nav>
            <div style="margin-top: auto;">
                <div class="nav-item" id="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </div>
            </div>
        </aside>

        <main class="main-content">
            <!-- View: Clients -->
            <section id="view-clients" class="app-view">
                <header class="page-header">
                    <div>
                        <h2>Clientes</h2>
                        <p style="color: var(--text-muted);">Gerencie as bios de seus clientes</p>
                    </div>
                    <button class="btn btn-primary" id="btn-new-client">
                        <i class="fas fa-plus"></i> Novo Cliente
                    </button>
                </header>
                <div class="client-list" id="client-list">
                    <!-- Clients will be injected here -->
                </div>
            </section>

            <!-- View: Analytics -->
            <section id="view-analytics" class="app-view" style="display: none;">
                <header class="page-header">
                    <div>
                        <h2>Analytics</h2>
                        <p style="color: var(--text-muted);">Acompanhe o desempenho dos links</p>
                    </div>
                    <button class="btn btn-outline" id="btn-refresh-analytics">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </header>
                
                <div class="stats-grid" id="stats-summary" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px;">
                    <!-- Stats cards -->
                </div>

                <div class="client-card" style="flex-direction: column; align-items: stretch; gap: 0; padding: 0; overflow: hidden;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);">
                            <tr>
                                <th style="padding: 16px; font-size: 13px; color: var(--text-muted);">CLIENTE</th>
                                <th style="padding: 16px; font-size: 13px; color: var(--text-muted);">LINK / TIPO</th>
                                <th style="padding: 16px; font-size: 13px; color: var(--text-muted); text-align: center;">CLIQUES</th>
                            </tr>
                        </thead>
                        <tbody id="analytics-list">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Client Modal -->
    <div class="modal" id="client-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Novo Cliente</h3>
                <i class="fas fa-times close-modal" id="close-modal"></i>
            </div>

            <form id="client-form">
                <input type="hidden" id="edit-slug">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Nome do Cliente</label>
                        <input type="text" id="client-name" class="form-control" required placeholder="Ex: Supermercado Marinho">
                    </div>
                    <div class="form-group">
                        <label>Slug (URL)</label>
                        <input type="text" id="client-slug" class="form-control" required placeholder="ex: supermercado-marinho">
                    </div>
                </div>

                <div class="form-group">
                    <label>Logo do Cliente</label>
                    <div style="display: flex; gap: 12px; align-items: center;">
                        <div id="logo-preview" style="width: 64px; height: 64px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface-light); display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;">
                            <i class="fas fa-image" style="color: var(--text-muted);"></i>
                        </div>
                        <div style="flex: 1;">
                            <input type="file" id="client-logo-file" class="form-control" accept="image/*" style="margin-bottom: 8px;">
                            <input type="url" id="client-logo" class="form-control" placeholder="Ou cole a URL aqui">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Descrição (Tagline)</label>
                    <textarea id="client-desc" class="form-control" rows="2" placeholder="Fale com nossa equipe..."></textarea>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border: 1px solid var(--border); padding: 15px; border-radius: var(--radius); margin-bottom: 20px;">
                    <div class="form-group" style="margin-bottom: 10px;">
                        <label>Telefone Rodapé</label>
                        <input type="text" id="footer-phone" class="form-control" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <label>Local Rodapé</label>
                        <input type="text" id="footer-address" class="form-control" placeholder="Cidade - UF">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Instagram Rodapé</label>
                        <input type="text" id="footer-instagram" class="form-control" placeholder="@usuario">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Horário Rodapé</label>
                        <input type="text" id="footer-hours" class="form-control" placeholder="Seg a Sex: 08h às 18h">
                    </div>
                </div>

                <div class="color-inputs">
                    <div class="form-group">
                        <label>Cor de Destaque</label>
                        <div class="color-picker-wrap">
                            <input type="color" id="client-accent" value="#d1ff4d">
                            <input type="text" id="client-accent-text" class="form-control" value="#d1ff4d">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Cor de Fundo</label>
                        <div class="color-picker-wrap">
                            <input type="color" id="client-bg" value="#020b1c">
                            <input type="text" id="client-bg-text" class="form-control" value="#020b1c">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Status</label>
                    <select id="client-status" class="form-control">
                        <option value="active">Ativo</option>
                        <option value="inactive">Inativo</option>
                    </select>
                </div>

                <div class="links-editor">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; margin-top: 20px;">
                        <h4 style="font-weight: 700;">Links</h4>
                        <button type="button" class="btn btn-outline" id="btn-add-link" style="padding: 6px 12px; font-size: 12px;">
                            <i class="fas fa-plus"></i> Adicionar Link
                        </button>
                    </div>
                    <div class="links-list" id="links-list">
                        <!-- Links will be injected here -->
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px;">
                    <button type="button" class="btn btn-outline" id="btn-cancel">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="btn-save-client">
                        Salvar Cliente <div class="loader" id="save-loader"></div>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom Confirm Modal -->
    <div class="modal" id="confirm-modal" style="z-index: 4000;">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div style="font-size: 48px; color: #ef4444; margin-bottom: 20px;">
                <i class="fas fa-exclamation-circle"></i>
            </div>
            <h3 id="confirm-title" style="margin-bottom: 12px;">Tem certeza?</h3>
            <p id="confirm-msg" style="color: var(--text-muted); margin-bottom: 30px;">Esta ação não pode ser desfeita.</p>
            <div style="display: flex; gap: 12px; justify-content: center;">
                <button class="btn btn-outline" id="btn-confirm-cancel" style="flex: 1;">Cancelar</button>
                <button class="btn btn-danger" id="btn-confirm-ok" style="flex: 1;">Sim, Excluir</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://ejkoqkggtwkloukpekpv.supabase.co';
        const supabaseKey = 'sb_publishable_PIMTKiW8Y2ZX7zkp8_kxqQ_BguIfEL3';
        const supabase = createClient(supabaseUrl, supabaseKey);

        const modal = document.getElementById('client-modal');
        const closeModal = () => {
            if (modal) modal.style.display = 'none';
            document.getElementById('client-form').reset();
            document.getElementById('links-list').innerHTML = '';
        };

        // Global Error Tracking
        window.onerror = function(msg, url, line, col, error) {
            alert(`ERRO GLOBAL: ${msg}\nLinha: ${line}\nErro: ${error}`);
            console.error("Global Error:", {msg, url, line, col, error});
            return false;
        };

        const LINK_TYPES = [
            { id: 'whatsapp', label: 'WhatsApp' },
            { id: 'instagram', label: 'Instagram' },
            { id: 'phone', label: 'Telefone' },
            { id: 'maps', label: 'Localização' },
            { id: 'website', label: 'Site' },
            { id: 'group', label: 'Grupo' },
            { id: 'app', label: 'App' },
            { id: 'message', label: 'Mensagem' },
            { id: 'email', label: 'E-mail' }
        ];

        // Global functions exposure (using function declarations for hoisting)
        window.loadClients = loadClients;
        window.renderClients = renderClients;
        window.addLinkRow = addLinkRow;
        window.saveClient = saveClient;
        window.editClient = editClient;
        window.deleteClient = deleteClient;
        window.closeModal = closeModal;
        window.loadAnalytics = loadAnalytics;

        // Auth state
        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                loadClients();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // Login
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const loader = document.getElementById('login-loader');
            
            if (!email || !pass) return showToast("Preencha todos os campos");

            loader.style.display = 'inline-block';
            try {
                console.log("Tentando login com Supabase:", email);
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: pass,
                });
                
                if (error) throw error;
                console.log("Login realizado com sucesso!");
            } catch (e) {
                console.error("Login error:", e);
                alert("Erro ao entrar: " + (e.message || "Credenciais inválidas"));
                showToast("Erro ao entrar: " + e.message);
            } finally {
                loader.style.display = 'none';
            }
        });

        // Global Event Delegation (for static elements)
        document.addEventListener('click', (e) => {
            const btnLogout = e.target.closest('#btn-logout');
            const btnNewClient = e.target.closest('#btn-new-client');
            const btnCancel = e.target.closest('#btn-cancel');
            const btnCloseModal = e.target.closest('#close-modal');
            const btnAddLink = e.target.closest('#btn-add-link');

            if (btnLogout) {
                supabase.auth.signOut();
            } else if (btnNewClient) {
                document.getElementById('client-form').reset();
                document.getElementById('edit-slug').value = '';
                document.getElementById('client-slug').value = '';
                document.getElementById('client-slug').disabled = false;
                document.getElementById('links-list').innerHTML = '';
                document.getElementById('modal-title').innerText = 'Novo Cliente';
                document.getElementById('logo-preview').innerHTML = `<i class="fas fa-image" style="color: var(--text-muted);"></i>`;
                modal.style.display = 'flex';
            } else if (e.target.closest('.nav-item[data-view]')) {
                const nav = e.target.closest('.nav-item');
                const view = nav.dataset.view;
                
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                nav.classList.add('active');
                
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById(`view-${view}`).style.display = 'block';
                
                if (view === 'analytics') loadAnalytics();
                else loadClients();
            } else if (e.target.closest('#btn-refresh-analytics')) {
                loadAnalytics();
            } else if (btnCancel || btnCloseModal) {
                closeModal();
            } else if (btnAddLink) {
                addLinkRow();
            }
        });

        // Real-time Clients Listener
        let channel = null;
        async function loadClients() {
            console.log("Iniciando carregamento de clientes...");
            
            const { data: clients, error } = await supabase
                .from('clients')
                .select('*')
                .order('updated_at', { ascending: false });

            if (error) {
                console.error("Erro ao carregar clientes:", error);
                showToast("Erro ao carregar dados.");
                return;
            }

            renderClients(clients);

            // Setup Realtime
            if (channel) supabase.removeChannel(channel);
            
            channel = supabase.channel('clients-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'clients' }, () => {
                    loadClients();
                })
                .subscribe();
        }

        function renderClients(clients) {
            const list = document.getElementById('client-list');
            if (!list) return;
            list.innerHTML = '';
            
            if (!clients || clients.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:var(--text-muted); margin-top:20px;">Nenhum cliente cadastrado.</p>';
                return;
            }

            clients.forEach(client => {
                const card = document.createElement('div');
                card.className = 'client-card';
                card.innerHTML = `
                    <div class="client-info">
                        ${client.logo ? `<img src="${client.logo}" class="client-logo">` : `<div class="client-logo" style="display:flex;align-items:center;justify-content:center;background:var(--surface-light);color:var(--primary);font-weight:800">${(client.name || 'C')[0]}</div>`}
                        <div class="client-details">
                            <h3>${client.name || 'Sem nome'}</h3>
                            <a href="linkbio.html#${client.slug}" target="_blank" style="font-size: 12px; color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 4px;">
                                <i class="fas fa-external-link-alt"></i> linkbio.html#${client.slug}
                            </a>
                        </div>
                    </div>
                    <div style="display:flex;align-items:center;gap:12px;">
                        <span class="client-status status-${client.status || 'active'}">${client.status || 'active'}</span>
                        <button class="btn btn-outline btn-edit" data-slug="${client.slug}">
                            <i class="fas fa-edit"></i> Editar
                        </button>
                        <button class="btn btn-danger btn-delete" data-slug="${client.slug}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;

                // Adiciona listeners diretamente aos botões para máxima confiabilidade
                card.querySelector('.btn-edit').onclick = (e) => {
                    e.stopPropagation();
                    console.log("Edit clicado:", client.slug);
                    window.editClient(client.slug);
                };
                card.querySelector('.btn-delete').onclick = (e) => {
                    e.stopPropagation();
                    console.log("Delete clicado:", client.slug);
                    window.deleteClient(client.slug);
                };

                list.appendChild(card);
            });
        }
        window.renderClients = renderClients;

        function addLinkRow(link = { type: 'whatsapp', label: '', url: '' }) {
            const list = document.getElementById('links-list');
            const row = document.createElement('div');
            row.className = 'link-row';
            row.innerHTML = `
                <select class="form-control link-type">
                    ${LINK_TYPES.map(t => `<option value="${t.id}" ${link.type === t.id ? 'selected' : ''}>${t.label}</option>`).join('')}
                </select>
                <input type="text" class="form-control link-label" placeholder="Rótulo" value="${link.label}">
                <input type="text" class="form-control link-desc" placeholder="Descrição (Opcional)" value="${link.description || ''}">
                <input type="text" class="form-control link-url" placeholder="URL" value="${link.url}">
                <button type="button" class="btn btn-danger btn-remove-link" style="padding:0; width:44px; height:44px; justify-content:center;">
                    <i class="fas fa-times"></i>
                </button>
            `;
            row.querySelector('.btn-remove-link').onclick = () => row.remove();
            list.appendChild(row);
        }

        // Logo Preview & Clear
        document.getElementById('client-logo-file').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('logo-preview').innerHTML = `<img src="${ev.target.result}" style="width:100%; height:100%; object-fit:contain;">`;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('client-logo').oninput = e => {
            if (e.target.value) {
                document.getElementById('logo-preview').innerHTML = `<img src="${e.target.value}" style="width:100%; height:100%; object-fit:contain;">`;
            }
        };

        // Color Sync
        document.getElementById('client-accent').oninput = e => document.getElementById('client-accent-text').value = e.target.value;
        document.getElementById('client-bg').oninput = e => document.getElementById('client-bg-text').value = e.target.value;

        // Save Client Logic
        async function saveClient() {
            const form = document.getElementById('client-form');
            
            if (!form.reportValidity()) return;

            const loader = document.getElementById('save-loader');
            const btnSave = document.getElementById('btn-save-client');
            
            loader.style.display = 'inline-block';
            btnSave.disabled = true;

            try {
                let slug = document.getElementById('client-slug').value.trim().toLowerCase();
                slug = slug.replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                
                const name = document.getElementById('client-name').value.trim();
                const fileInput = document.getElementById('client-logo-file');
                let logo = document.getElementById('client-logo').value.trim();
                
                // Upload image if file is selected
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${slug}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                    const filePath = `logos/${fileName}`;

                    console.log("Fazendo upload da logo...", filePath);
                    
                    const { data: uploadData, error: uploadError } = await supabase.storage
                        .from('logos')
                        .upload(filePath, file, { upsert: true });

                    if (uploadError) throw new Error("Erro no upload da imagem: " + uploadError.message);

                    const { data: publicUrlData } = supabase.storage
                        .from('logos')
                        .getPublicUrl(filePath);
                    
                    logo = publicUrlData.publicUrl;
                }

                const clientData = {
                    slug, 
                    name, 
                    logo, 
                    description: document.getElementById('client-desc').value,
                    footer_phone: document.getElementById('footer-phone').value,
                    footer_address: document.getElementById('footer-address').value,
                    footer_instagram: document.getElementById('footer-instagram').value,
                    footer_hours: document.getElementById('footer-hours').value,
                    accent_color: document.getElementById('client-accent-text').value.trim(),
                    bg_color: document.getElementById('client-bg-text').value.trim(),
                    status: document.getElementById('client-status').value,
                    links: [],
                    updated_at: new Date().toISOString()
                };

                if (!slug) throw new Error("Slug inválido. Use apenas letras e números.");
                if (!name) throw new Error("Nome do cliente é obrigatório.");

                console.log("Enviando dados para o Supabase...", slug);

                const links = [];
                document.querySelectorAll('.link-row').forEach(row => {
                    const type = row.querySelector('.link-type').value;
                    const label = row.querySelector('.link-label').value.trim();
                    const description = row.querySelector('.link-desc').value.trim();
                    const url = row.querySelector('.link-url').value.trim();
                    if (label || url) links.push({ type, label, description, url });
                });
                clientData.links = links;

                const { error: saveError } = await supabase
                    .from('clients')
                    .upsert(clientData);

                if (saveError) throw saveError;

                console.log("Salvo com sucesso!");
                showToast("Cliente salvo com sucesso!");
                closeModal();
                loadClients();
            } catch (err) {
                console.error("Erro fatal ao salvar:", err);
                alert("ERRO AO SALVAR: " + err.message);
            } finally {
                loader.style.display = 'none';
                btnSave.disabled = false;
            }
        }

        // Atribui o evento ao botão diretamente
        document.getElementById('btn-save-client').onclick = (e) => {
            e.preventDefault();
            saveClient();
        };

        // Mantém o listener do formulário como backup ou remove se preferir
        document.getElementById('client-form').onsubmit = (e) => {
            e.preventDefault();
            saveClient();
        };

        // Edit Client
        async function editClient(slug) {
            console.log("Abrindo edição para:", slug);
            
            const btn = document.querySelector(`.btn-edit[data-slug="${slug}"]`) || 
                        Array.from(document.querySelectorAll('.btn-edit')).find(b => b.onclick && b.onclick.toString().includes(slug));

            const originalContent = btn ? btn.innerHTML : '<i class="fas fa-edit"></i>';
            if (btn) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                btn.disabled = true;
            }

            try {
                const { data, error } = await supabase
                    .from('clients')
                    .select('*')
                    .eq('slug', slug)
                    .single();

                if (error) throw error;
                if (!data) return showToast("Cliente não encontrado");

                document.getElementById('edit-slug').value = slug;
                document.getElementById('client-slug').value = slug;
                document.getElementById('client-slug').disabled = true;
                document.getElementById('client-name').value = data.name || '';
                document.getElementById('client-logo').value = data.logo || '';
                if (data.logo) {
                    document.getElementById('logo-preview').innerHTML = `<img src="${data.logo}" style="width:100%; height:100%; object-fit:contain;">`;
                } else {
                    document.getElementById('logo-preview').innerHTML = `<i class="fas fa-image" style="color: var(--text-muted);"></i>`;
                }
                document.getElementById('client-logo-file').value = '';
                document.getElementById('client-desc').value = data.description || '';
                document.getElementById('footer-phone').value = data.footer_phone || '';
                document.getElementById('footer-address').value = data.footer_address || '';
                document.getElementById('footer-instagram').value = data.footer_instagram || '';
                document.getElementById('footer-hours').value = data.footer_hours || '';
                document.getElementById('client-accent-text').value = data.accent_color || '#d1ff4d';
                document.getElementById('client-accent').value = data.accent_color || '#d1ff4d';
                document.getElementById('client-bg-text').value = data.bg_color || '#020b1c';
                document.getElementById('client-bg').value = data.bg_color || '#020b1c';
                document.getElementById('client-status').value = data.status || 'active';

                const list = document.getElementById('links-list');
                list.innerHTML = '';
                (data.links || []).forEach(l => addLinkRow(l));

                document.getElementById('modal-title').innerText = 'Editar Cliente';
                modal.style.display = 'flex';
            } catch (e) {
                console.error("Error loading client for edit:", e);
                alert("Erro ao carregar dados para edição.");
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        // Custom Confirm Helper
        function customConfirm(title, msg) {
            return new Promise((resolve) => {
                const cModal = document.getElementById('confirm-modal');
                document.getElementById('confirm-title').innerText = title;
                document.getElementById('confirm-msg').innerText = msg;
                cModal.style.display = 'flex';
                
                const btnOk = document.getElementById('btn-confirm-ok');
                const btnCancel = document.getElementById('btn-confirm-cancel');
                
                const handle = (result) => {
                    cModal.style.display = 'none';
                    btnOk.onclick = null;
                    btnCancel.onclick = null;
                    resolve(result);
                };
                
                btnOk.onclick = () => handle(true);
                btnCancel.onclick = () => handle(false);
            });
        }

        // Delete Client
        async function deleteClient(slug) {
            console.log("Tentando deletar:", slug);
            const confirmed = await customConfirm("Excluir Cliente", `Tem certeza que deseja excluir o cliente ${slug}? Esta ação é permanente.`);
            if (!confirmed) return;
            
            const btn = document.querySelector(`.btn-delete[data-slug="${slug}"]`) || 
                        Array.from(document.querySelectorAll('.btn-delete')).find(b => b.closest('.client-card').innerHTML.includes(slug));

            const originalContent = btn ? btn.innerHTML : '<i class="fas fa-trash"></i>';
            if (btn) {
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                btn.disabled = true;
            }

            console.log("Deleting client:", slug);
            try {
                const { error } = await supabase
                    .from('clients')
                    .delete()
                    .eq('slug', slug);

                if (error) throw error;

                showToast("Cliente excluído.");
                loadClients();
            } catch (e) {
                console.error("Error deleting client:", e);
                alert("Erro ao excluir: " + (e.message || "Verifique suas permissões no Supabase."));
                showToast("Erro ao excluir.");
            } finally {
                if (btn) {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            }
        }

        async function loadAnalytics() {
            const list = document.getElementById('analytics-list');
            const summary = document.getElementById('stats-summary');
            list.innerHTML = '<tr><td colspan="3" style="padding:40px; text-align:center;"><i class="fas fa-spinner fa-spin"></i> Carregando estatísticas...</td></tr>';

            try {
                const { data: clicks, error } = await supabase
                    .from('clicks')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                // Group by client and link
                const stats = {};
                let totalClicks = clicks.length;

                clicks.forEach(c => {
                    const key = `${c.client_slug}||${c.link_label}`;
                    if (!stats[key]) stats[key] = { slug: c.client_slug, label: c.link_label, type: c.link_type, count: 0 };
                    stats[key].count++;
                });

                // Summary
                summary.innerHTML = `
                    <div class="client-card" style="padding: 24px; text-align: center; flex-direction: column;">
                        <div style="font-size: 32px; font-weight: 800; color: var(--primary);">${totalClicks}</div>
                        <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Cliques Totais</div>
                    </div>
                    <div class="client-card" style="padding: 24px; text-align: center; flex-direction: column;">
                        <div style="font-size: 32px; font-weight: 800; color: var(--primary);">${Object.keys(stats).length}</div>
                        <div style="font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Links Ativos</div>
                    </div>
                `;

                list.innerHTML = '';
                if (totalClicks === 0) {
                    list.innerHTML = '<tr><td colspan="3" style="padding:40px; text-align:center; color:var(--text-muted);">Nenhum clique registrado ainda.</td></tr>';
                    return;
                }

                Object.values(stats)
                    .sort((a,b) => b.count - a.count)
                    .forEach(s => {
                        const row = document.createElement('tr');
                        row.style.borderBottom = '1px solid var(--border)';
                        row.innerHTML = `
                            <td style="padding: 16px; font-weight: 600;">${s.slug}</td>
                            <td style="padding: 16px;">
                                <div style="font-weight: 600;">${s.label}</div>
                                <div style="font-size: 11px; color: var(--text-muted);">${s.type}</div>
                            </td>
                            <td style="padding: 16px; text-align: center;">
                                <span style="background: rgba(209,255,77,0.1); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-weight: 800;">
                                    ${s.count}
                                </span>
                            </td>
                        `;
                        list.appendChild(row);
                    });

            } catch (e) {
                console.error("Analytics Error:", e);
                list.innerHTML = `<tr><td colspan="3" style="padding:40px; text-align:center; color:var(--accent-red);">Erro ao carregar dados: ${e.message}</td></tr>`;
            }
        }

        function showToast(msg) {
            console.log("Toast:", msg);
            const t = document.getElementById('toast');
            if (!t) return;
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => {
                t.style.display = 'none';
            }, 3000);
        }


        // Remove redundant assignments at the end
    </script>
</body>
