<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050505;
  --accent:#d1ff4d;

html,body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#bg-layer{position:fixed;inset:0;background:url('bg.png') center/cover no-repeat;opacity:0.08;z-index:-2}
.ambient-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:-1;opacity:.28}
.orb-1{width:55vw;height:55vw;top:-15vw;left:-10vw;background:radial-gradient(circle,color-mix(in srgb, var(--accent) 40%, #1a4fff) 0%,transparent 70%)}
.orb-2{width:45vw;height:45vw;top:30vh;right:-15vw;background:radial-gradient(circle,color-mix(in srgb, var(--accent) 30%, #0e2fa0) 0%,transparent 70%);opacity:.18}
.orb-3{width:60vw;height:60vw;bottom:-20vw;left:10vw;background:radial-gradient(circle,color-mix(in srgb, var(--accent) 20%, #102060) 0%,transparent 70%);opacity:.22}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse 100% 80% at 50% 35%,transparent 15%,var(--bg) 78%);z-index:0;pointer-events:none}
#hero{height:100vh;width:100%;position:fixed;top:0;left:0;display:flex;justify-content:center;align-items:center;overflow:hidden;z-index:2000;background:radial-gradient(ellipse 160% 110% at 50% 60%, var(--bg-soft, #0f0f0f) 0%, var(--bg, #050505) 65%)}
.logo-glow-bg{position:absolute;width:72vw;height:72vw;max-width:420px;max-height:420px;border-radius:50%;background:radial-gradient(circle,color-mix(in srgb, var(--accent) 32%, transparent) 0%,color-mix(in srgb, var(--accent) 16%, transparent) 35%,color-mix(in srgb, var(--accent) 6%, transparent) 60%,transparent 75%);z-index:8;pointer-events:none;animation:logoPulse 3.5s ease-in-out infinite}
@keyframes logoPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.floating-elements{position:absolute;inset:0;pointer-events:none;z-index:5}
.logo-container{position:relative;width:min(360px,78vw);aspect-ratio:320/170;z-index:10;transform-origin:center center;will-change:transform}
.logo-half{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center;will-change:transform,filter}
#logo-left-half{clip-path:inset(0 50% 0 0)}
#logo-right-half{clip-path:inset(0 0 0 50%)}
.logo-text-hero{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(2rem,8vw,3rem);font-weight:900;letter-spacing:-.03em;will-change:transform,filter}

#logo-text-right{clip-path:inset(0 0 0 50%)}
.glow-line{position:absolute;top:-30%;left:50%;width:3px;height:160%;background:linear-gradient(to bottom,transparent 0%,color-mix(in srgb, var(--accent) 50%, transparent) 20%,#fff 50%,color-mix(in srgb, var(--accent) 50%, transparent) 80%,transparent 100%);box-shadow:0 0 10px 4px var(--accent),0 0 36px 10px color-mix(in srgb, var(--accent) 70%, transparent),0 0 70px 22px color-mix(in srgb, var(--accent) 35%, transparent);opacity:0;transform:translateX(-50%);z-index:11;transform-origin:center center;will-change:transform,opacity}
#portal-flash{position:absolute;inset:0;background:radial-gradient(ellipse 55% 100% at 50% 50%,#fff 0%,var(--accent) 22%,color-mix(in srgb, var(--accent) 45%, transparent) 52%,transparent 72%);z-index:18;pointer-events:none;opacity:0}
.scroll-hint{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);text-align:center;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.30);white-space:nowrap;z-index:12}
.scroll-hint .chevron{margin-top:9px;font-size:13px;color:var(--accent);animation:bounce 2s ease-in-out infinite}

#main-wrapper{position:relative;z-index:30;opacity:0;padding-bottom:20px}

.page-header{padding:60px 24px 28px;text-align:center}

.card{display:flex;flex-direction:row;align-items:stretch;background:color-mix(in srgb, var(--card-color, var(--accent)) 8%, rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,.12);border-radius:var(--radius);text-decoration:none;color:var(--text);position:relative;overflow:hidden;min-height:148px;transition:transform .22s ease,box-shadow .22s ease,background .22s ease;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(16px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:var(--radius) var(--radius) 0 0;background:linear-gradient(to bottom,rgba(255,255,255,.055) 0%,transparent 100%);pointer-events:none;z-index:1}
.card:active{transform:scale(.985);box-shadow:0 4px 24px rgba(0,0,0,.3)}
@media(hover:hover){.card:hover{transform:translateY(-5px);background:rgba(255,255,255,.06);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 1.5px var(--card-color,rgba(255,255,255,.12)),0 0 40px -10px var(--card-color,transparent)}.card:hover .card-cta i{transform:translateX(4px)}}

.card-cat{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--card-color,var(--accent));background:color-mix(in srgb,var(--card-color,var(--accent)) 12%,transparent);border:1px solid color-mix(in srgb,var(--card-color,var(--accent)) 28%,transparent);padding:3px 9px;border-radius:20px;margin-bottom:10px;width:fit-content}
.card-name{font-size:1.18rem;font-weight:800;margin-bottom:7px;line-height:1.25;letter-spacing:-.02em}

.card-cta i{font-size:11px;transition:transform .2s ease}
.card-icon-area{width:110px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:12px 14px;position:relative;z-index:4}
.icon-placeholder{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center;animation:iconFloat 3.5s ease-in-out infinite}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(0)}35%{transform:translateY(-7px) rotate(1.5deg)}65%{transform:translateY(-3px) rotate(-1deg)}}
.icon-glow{position:absolute;inset:15px;border-radius:50%;background:var(--card-color,rgba(255,255,255,0.3));filter:blur(14px);opacity:.35;transition:opacity .22s}
.card:hover .icon-glow,.card:active .icon-glow{opacity:.7}
.icon-inner{position:relative;width:90px;height:90px;display:flex;align-items:center;justify-content:center;z-index:5}
.icon-img{width:100%;height:100%;background-size:contain;background-position:center;background-repeat:no-repeat;filter:drop-shadow(0 12px 20px rgba(0,0,0,0.45));pointer-events:none;transition:transform .3s ease}
.card:hover .icon-img{transform:scale(1.15) rotate(4deg)}
.icon-inner::after{display:none}
.info-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 36px;max-width:520px;margin:0 auto}
.info-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:5px;backdrop-filter:blur(12px)}
.info-item i{font-size:20px;color:var(--accent);margin-bottom:2px}
.info-item strong{font-size:.85rem;font-weight:700}

.site-footer{padding:28px 24px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.footer-logo{height:36px;object-fit:contain;opacity:.7}

@media(min-width:600px){

  .card{flex-direction:column;min-height:unset}
  .card-body{padding:22px 20px 16px}
  .card-icon-area{width:100%;padding:0 20px 20px;justify-content:flex-start}

  .icon-inner{width:90px;height:90px}

}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.9rem;color:var(--muted)}
.error-screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;text-align:center;padding:24px}
.error-screen i{font-size:48px;color:rgba(255,77,109,.5);margin-bottom:8px}
.error-screen h2{font-size:1.4rem;font-weight:800}
.error-screen p{color:var(--muted);font-size:.9rem;margin-bottom:20px}
.error-screen .btn-retry{background:var(--accent);color:#000;padding:12px 24px;border-radius:30px;text-decoration:none;font-weight:700;font-size:14px;transition:transform .2s}
.error-screen .btn-retry:active{transform:scale(.95)}

/* Fixed Header */
.sticky-header{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(2,11,28,0.4);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:1000;transform:translateY(-100%);transition:transform .5s cubic-bezier(0.4,0,0.2,1);pointer-events:none}
.sticky-header.visible{transform:translateY(0);pointer-events:auto}
.header-logo-mini{height:32px;width:auto;object-fit:contain}
.header-cta-btn{background:var(--accent);color:#000;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;text-decoration:none;box-shadow:0 4px 15px color-mix(in srgb, var(--accent) 30%, transparent)}

/* Skeleton Loading */
.skeleton-screen{position:fixed;inset:0;background:var(--bg);z-index:9998;padding:80px 20px;display:flex;flex-direction:column;align-items:center;gap:20px;overflow:hidden}
.sk-logo{width:120px;height:120px;background:rgba(255,255,255,0.05);border-radius:50%;margin-bottom:20px}
.sk-title{width:200px;height:32px;background:rgba(255,255,255,0.05);border-radius:8px}
.sk-card{width:100%;max-width:520px;height:140px;background:rgba(255,255,255,0.03);border-radius:24px;border:1px solid rgba(255,255,255,0.05)}
.shimmer{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:150% 0}100%{background-position:-50% 0}}
</style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabaseUrl = 'https://ejkoqkggtwkloukpekpv.supabase.co';
const supabaseKey = 'sb_publishable_PIMTKiW8Y2ZX7zkp8_kxqQ_BguIfEL3';
const supabase = createClient(supabaseUrl, supabaseKey);

const STORAGE_URL = 'https://ejkoqkggtwkloukpekpv.supabase.co/storage/v1/object/public/logos';

const LINK_ICONS = {
  whatsapp: {icon:'fab fa-whatsapp', img:`${STORAGE_URL}/WHA.png`, color:'#25d366', cat:'ATENDIMENTO', cta:'Falar no WhatsApp'},
  instagram: {icon:'fab fa-instagram', img:`${STORAGE_URL}/INSTAGRAM.png`, color:'#e1306c', cat:'REDES SOCIAIS', cta:'Seguir Agora'},
  phone: {icon:'fas fa-phone', img:`${STORAGE_URL}/TELEFO.png`, color:'#f97316', cat:'TELEFONE', cta:'Ligar Agora'},
  maps: {icon:'fas fa-map-marker-alt', img:`${STORAGE_URL}/LOCAL.png`, color:'#06b6d4', cat:'LOCALIZAÇÃO', cta:'Ver no Mapa'},
  website: {icon:'fas fa-globe', img:`${STORAGE_URL}/SITE.png`, color:'#818cf8', cat:'SITE OFICIAL', cta:'Visitar o Site'},
  group: {icon:'fas fa-users', img:`${STORAGE_URL}/GRUPO.png`, color:'#3b82f6', cat:'PROMOÇÕES', cta:'Entrar no Grupo'},
  app: {icon:'fas fa-mobile-alt', img:`${STORAGE_URL}/APP.png`, color:'#60a5fa', cat:'APLICATIVO', cta:'Baixar Aplicativo'},
  message: {icon:'fas fa-comment', img:`${STORAGE_URL}/MENSA.png`, color:'#2dd4bf', cat:'ATENDIMENTO', cta:'Fale com a Loja'},
  email: {icon:'fas fa-envelope', img:`${STORAGE_URL}/MENSA.png`, color:'#f59e0b', cat:'E-MAIL', cta:'Enviar E-mail'},
};

// Helper to mix colors for CSS
function colorMix(base, overlay, percent) {
  return `color-mix(in srgb, ${base}, ${overlay} ${percent}%)`;
}

async function loadClient() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('client') || window.location.hash.substring(1);

  if (!slug) {
    showError("Por favor, especifique um cliente na URL (ex: linkbio.html#slug)");
    return;
  }

  try {
    const { data, error } = await supabase
      .from('clients')
      .select('*')
      .eq('slug', slug)
      .single();

    if (error) {
      showError(`O cliente "${slug}" não foi encontrado no banco de dados.`);
      return;
    }
    
    if (data.status !== 'active') {
      showError("Este link bio está desativado no momento.");
      return;
    }
    buildPage(data);
  } catch(e) {
    console.error("Erro ao carregar:", e);
    showError(`Erro de conexão com o Supabase: ${e.message}.`);
  }
}

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  const errorScreen = document.getElementById('error-screen');
  errorScreen.style.display = 'flex';
  if (msg) {
    errorScreen.querySelector('p').innerText = msg;
  }
}

function buildPage(data) {
  const accent = data.accent_color || '#d1ff4d';
  const bg = data.bg_color || '#020b1c';

  // CSS vars
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--bg', bg);
  
  // Calculate soft bg for hero
  const softBg = colorMix(bg, accent, 15);
  document.documentElement.style.setProperty('--bg-soft', softBg);
  
  // Update Orbs
  document.querySelectorAll('.ambient-orb').forEach((orb, i) => {
    orb.style.background = `radial-gradient(circle, ${accent}${i === 0 ? '44' : '22'} 0%, transparent 70%)`;
  });

  // Update Logo Glow and Reveal
  const logoGlow = document.querySelector('.logo-glow-bg');
  if (logoGlow) {
    logoGlow.style.background = `radial-gradient(circle, ${accent}55 0%, ${accent}22 35%, ${accent}0a 60%, transparent 75%)`;
  }
  
  const revealLogo = document.querySelector('.reveal-logo');
  if (revealLogo) {
    revealLogo.style.filter = `drop-shadow(0 0 35px ${accent})`;
  }

  // Update Animation Elements (Glow Line and Portal Flash)
  const glowLine = document.getElementById('glow');
  if (glowLine) {
    glowLine.style.background = `linear-gradient(to bottom, transparent 0%, ${accent}88 20%, #fff 50%, ${accent}88 80%, transparent 100%)`;
    glowLine.style.boxShadow = `0 0 10px 4px ${accent}, 0 0 36px 10px ${accent}aa, 0 0 70px 22px ${accent}44`;
  }

  const portalFlash = document.getElementById('portal-flash');
  if (portalFlash) {
    portalFlash.style.background = `radial-gradient(ellipse 55% 100% at 50% 50%, #fff 0%, ${accent} 22%, ${accent}aa 52%, transparent 72%)`;
  }

  document.title = data.name;
  
  // Dynamic Meta Tags (Client-side update)
  document.querySelector('meta[property="og:title"]').setAttribute('content', data.name);
  document.querySelector('meta[property="og:description"]').setAttribute('content', data.description || 'Acesse nossos links oficiais.');
  if (data.logo) {
    document.querySelector('meta[property="og:image"]').setAttribute('content', data.logo);
  }

  // Header mini logo
  const headerLogo = document.getElementById('header-logo-container');
  if (data.logo) {
    headerLogo.innerHTML = `<img src="${data.logo}" alt="${data.name}" class="header-logo-mini">`;
  } else {
    headerLogo.innerHTML = `<div style="font-weight:900;font-size:14px;color:var(--accent)">${data.name}</div>`;
  }


  // Hero logo
  if (data.logo) {
    document.getElementById('logo-left-half').style.backgroundImage = `url('${data.logo}')`;
    document.getElementById('logo-right-half').style.backgroundImage = `url('${data.logo}')`;
  } else {
    // Text logo fallback
    const lc = document.getElementById('logo-container');
    lc.innerHTML = `
      <div id="logo-left-half" class="logo-half logo-text-hero" style="clip-path:inset(0 50% 0 0);font-size:clamp(1.8rem,7vw,2.8rem)">${data.name}</div>
      <div id="logo-right-half" class="logo-half logo-text-hero" style="clip-path:inset(0 0 0 50%);font-size:clamp(1.8rem,7vw,2.8rem)">${data.name}</div>
      <div class="glow-line" id="glow"></div>
    `;
  }

  // Reveal logo
  const topReveal = document.getElementById('top-reveal-area');
  if (data.logo) {
    topReveal.innerHTML = `<img src="${data.logo}" alt="${data.name}" class="reveal-logo">`;
  } else {
    topReveal.innerHTML = `<div class="reveal-logo-text" style="color:${accent}">${data.name}</div>`;
  }

  // Footer
  const footerLogoWrap = document.getElementById('footer-logo-wrap');
  if (data.logo) {
    footerLogoWrap.innerHTML = `<img src="${data.logo}" alt="${data.name}" class="footer-logo">`;
  } else {
    footerLogoWrap.innerHTML = `<div class="footer-logo-text">${data.name}</div>`;
  }

  // Description
  if (data.description) {
    document.getElementById('contacts-sub').textContent = data.description;
    document.getElementById('footer-tagline').innerHTML = `${data.description}`;
  }

  // Footer Info Bar
  const infoBar = document.getElementById('info-bar');
  const infoItems = [
    { icon: 'fas fa-phone', label: 'CONTATO', value: data.footer_phone },
    { icon: 'fas fa-map-marker-alt', label: 'LOCAL', value: data.footer_address },
    { icon: 'fab fa-instagram', label: 'INSTAGRAM', value: data.footer_instagram },
    { icon: 'fas fa-clock', label: 'HORÁRIO', value: data.footer_hours }
  ].filter(item => item.value);

  if (infoItems.length > 0) {
    infoBar.style.display = 'grid';
    infoBar.innerHTML = infoItems.map(item => `
      <div class="info-item">
        <i class="${item.icon}"></i>
        <strong>${item.label}</strong>
        <span>${item.value}</span>
      </div>
    `).join('');
  } else {
    infoBar.style.display = 'none';
  }

  // Cards
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = (data.links||[]).map((link, i) => {
    const info = LINK_ICONS[link.type] || {icon:'fas fa-link', color: accent, cat:'LINK', cta:'Acessar'};
    const delay = (i % 2) * 60;
    return `
      <a href="${link.url}" class="card" target="_blank" rel="noopener" style="--card-color:${info.color}">
        <div class="card-accent-line"></div>
        <div class="card-body">
          <span class="card-cat">${info.cat}</span>
          <h3 class="card-name">${link.label}</h3>
          <p class="card-desc">${link.description || getDesc(link.type)}</p>
          <span class="card-cta">${info.cta} <i class="fas fa-arrow-right"></i></span>
        </div>
        <div class="card-icon-area" style="animation-delay:-${delay}ms">
          <div class="icon-placeholder">
            <div class="icon-glow" style="background:${info.color}"></div>
            <div class="icon-inner">
              ${info.img ? `<div class="icon-img" style="background-image:url('${info.img}')" aria-label="${link.label}"></div>` : `<i class="${info.icon}"></i>`}
            </div>
          </div>
        </div>
      </a>
    `;
  }).join('');

  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('skeleton-screen').style.display = 'none';
  initAnimations();
}

function getDesc(type) {
  const descs = {
    whatsapp: 'Fale com nossa equipe e receba as melhores ofertas.',
    instagram: 'Acompanhe novidades e promoções nas nossas redes.',
    phone: 'Fale diretamente com nossa equipe por telefone.',
    maps: 'Veja no mapa onde estamos e encontre o caminho.',
    website: 'Visite nosso site e confira o catálogo completo.',
    group: 'Entre no grupo e receba promoções exclusivas.',
    app: 'Baixe nosso aplicativo para iOS e Android.',
    message: 'Envie uma mensagem para nossa equipe.',
    email: 'Mande um e-mail para nossa equipe.',
  };
  return descs[type] || 'Acesse este link para mais informações.';
}

function initAnimations() {
  gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    const size = Math.random() * 5 + 2;
    const colors = ['rgba(80,160,255,0.5)','rgba(120,200,255,0.4)','rgba(180,220,255,0.35)','rgba(100,180,255,0.45)','rgba(209,255,77,0.25)'];
    el.style.cssText = `position:absolute;left:${Math.random()*90+5}%;top:${Math.random()*90+5}%;width:${size}px;height:${size}px;border-radius:50%;background:${colors[Math.floor(Math.random()*colors.length)]};opacity:0`;
    container.appendChild(el);
    gsap.to(el, {opacity:1, duration:.8, delay:Math.random()*1.5});
    gsap.to(el, {y:'random(-30,30)',x:'random(-20,20)',duration:'random(4,8)',repeat:-1,yoyo:true,ease:'sine.inOut',delay:Math.random()*3});
  }

  // Logo float
  let floatAnim = gsap.to('#logo-container', {y:-10,rotation:.5,duration:2.5,repeat:-1,yoyo:true,ease:'sine.inOut'});

  const tl = gsap.timeline({paused:true, onComplete: () => {
    document.body.style.overflow = 'auto';
  }});

  gsap.set('#portal-flash', {opacity:0});
  gsap.set('#glow', {opacity:0});
  gsap.set('#main-wrapper', {opacity:0,y:100});
  gsap.set(['#logo-left-half','#logo-right-half'], {filter:'brightness(1) saturate(1)'});

  tl.to('.scroll-hint', {opacity:0,y:20,duration:.3,ease:'power2.in'})
    .to('.logo-glow-bg', {scale:2,opacity:1,duration:.6,ease:'power2.inOut'}, 0)
    .to('#logo-container', {scale:1.15,duration:.6,ease:'power1.inOut'}, 0)
    .to('#logo-container', {scale:80,duration:1.2,ease:'power4.in'}, .6)
    .to(['#logo-left-half','#logo-right-half'], {filter:'brightness(2.5) saturate(1.5)',duration:.8,ease:'power2.in'}, .6)
    .to('#glow', {opacity:1,duration:.15,ease:'none'}, 1.6)
    .to('#portal-flash', {opacity:1,duration:.1,ease:'power4.in'}, 1.7)
    .to('#logo-left-half', {x:'-250vw',rotate:-20,duration:1.2,ease:'power3.inOut'}, 1.7)
    .to('#logo-right-half', {x:'250vw',rotate:20,duration:1.2,ease:'power3.inOut'}, 1.7)
    .to('#hero', {opacity:0,duration:.7,ease:'power2.inOut', onStart:()=>gsap.set('#main-wrapper',{opacity:1})}, 2.2)
    .to('#main-wrapper', {y:0,duration:1.0,ease:'power3.out'}, 2.3)
    .to('#portal-flash', {opacity:0,duration:1.0,ease:'power2.out'}, 2.2)
    .set('#hero', {display:'none'});

  // Sticky Header Scroll Trigger
  ScrollTrigger.create({
    trigger: '#main-wrapper',
    start: 'top top',
    onEnter: () => document.getElementById('sticky-header').classList.add('visible'),
    onLeaveBack: () => document.getElementById('sticky-header').classList.remove('visible'),
  });

  let played = false;
  function play() {
    if(played) return;
    played = true;
    floatAnim.kill();
    tl.play();
  }

  document.body.style.overflow = 'hidden';
  
  // Auto-play after a short delay for a premium feel
  setTimeout(play, 1000);

  // Still allow click to skip delay
  document.getElementById('hero').addEventListener('click', play);

  // Card animations
  document.querySelectorAll('.card').forEach((card, i) => {
    gsap.from(card, {
      scrollTrigger:{trigger:card,start:'top 90%'},
      opacity:0,y:28,duration:.45,delay:(i%2)*.06,ease:'power2.out'
    });
  });
}

loadClient();
</script>
</body>
</html>
