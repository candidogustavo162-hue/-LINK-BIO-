<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Bio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020b1c;
  --accent:#d1ff4d;
  --text:#ffffff;
  --muted:rgba(255,255,255,0.48);
  --radius:24px;
}
html,body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
#bg-layer{position:fixed;inset:0;background:url('bg.png') center/cover no-repeat;opacity:0.08;z-index:-2}
.ambient-orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:-1;opacity:.28}
.orb-1{width:55vw;height:55vw;top:-15vw;left:-10vw;background:radial-gradient(circle,#1a4fff 0%,transparent 70%)}
.orb-2{width:45vw;height:45vw;top:30vh;right:-15vw;background:radial-gradient(circle,#0e2fa0 0%,transparent 70%);opacity:.18}
.orb-3{width:60vw;height:60vw;bottom:-20vw;left:10vw;background:radial-gradient(circle,#102060 0%,transparent 70%);opacity:.22}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse 100% 80% at 50% 35%,transparent 15%,var(--bg) 78%);z-index:0;pointer-events:none}
header{position:fixed;top:0;width:100%;padding:13px 20px;display:flex;justify-content:space-between;align-items:center;z-index:100;background:rgba(2,11,28,.88);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06)}
.header-logo{height:34px;object-fit:contain}
.header-logo-text{font-size:1.1rem;font-weight:800;color:var(--text)}
.header-cta{font-size:13px;font-weight:700;color:#020b1c;background:var(--accent);padding:9px 20px;border-radius:24px;text-decoration:none;letter-spacing:.02em;transition:filter .15s}
.header-cta:hover{filter:brightness(1.08)}
#hero{height:100vh;width:100%;position:fixed;top:0;left:0;display:flex;justify-content:center;align-items:center;overflow:hidden;z-index:2000;background:radial-gradient(ellipse 160% 110% at 50% 60%,#0c2255 0%,#020b1c 65%)}
.logo-glow-bg{position:absolute;width:72vw;height:72vw;max-width:420px;max-height:420px;border-radius:50%;background:radial-gradient(circle,rgba(60,130,255,.32) 0%,rgba(40,100,220,.16) 35%,rgba(20,60,180,.06) 60%,transparent 75%);z-index:8;pointer-events:none;animation:logoPulse 3.5s ease-in-out infinite}
@keyframes logoPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.floating-elements{position:absolute;inset:0;pointer-events:none;z-index:5}
.logo-container{position:relative;width:min(360px,78vw);aspect-ratio:320/170;z-index:10;transform-origin:center center;will-change:transform}
.logo-half{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center;will-change:transform,filter}
#logo-left-half{clip-path:inset(0 50% 0 0)}
#logo-right-half{clip-path:inset(0 0 0 50%)}
.logo-text-hero{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(2rem,8vw,3rem);font-weight:900;letter-spacing:-.03em;will-change:transform,filter}
#logo-text-left{clip-path:inset(0 50% 0 0)}
#logo-text-right{clip-path:inset(0 0 0 50%)}
.glow-line{position:absolute;top:-30%;left:50%;width:3px;height:160%;background:linear-gradient(to bottom,transparent 0%,rgba(180,220,255,.5) 20%,#fff 50%,rgba(180,220,255,.5) 80%,transparent 100%);box-shadow:0 0 10px 4px rgba(160,210,255,1),0 0 36px 10px rgba(80,160,255,.7),0 0 70px 22px rgba(30,100,255,.35);opacity:0;transform:translateX(-50%);z-index:11;transform-origin:center center;will-change:transform,opacity}
#portal-flash{position:absolute;inset:0;background:radial-gradient(ellipse 55% 100% at 50% 50%,rgba(200,230,255,1) 0%,rgba(80,160,255,.85) 22%,rgba(20,80,200,.45) 52%,transparent 72%);z-index:18;pointer-events:none;opacity:0}
.scroll-hint{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);text-align:center;font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.30);white-space:nowrap;z-index:12}
.scroll-hint .chevron{margin-top:9px;font-size:13px;color:var(--accent);animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
#main-wrapper{position:relative;z-index:30;opacity:0;padding-bottom:20px}
.top-reveal-area{width:100%;height:60vh;display:flex;justify-content:center;align-items:center;padding-top:40px}
.reveal-logo{width:min(280px,60vw);height:auto;object-fit:contain;filter:drop-shadow(0 0 30px rgba(60,130,255,.4));animation:logoFloat 4s ease-in-out infinite}
.reveal-logo-text{font-size:clamp(2.5rem,10vw,4rem);font-weight:900;letter-spacing:-.03em;animation:logoFloat 4s ease-in-out infinite}
@keyframes logoFloat{0%,100%{transform:translateY(0) rotate(0)}30%{transform:translateY(-8px) rotate(.4deg)}60%{transform:translateY(-4px) rotate(-.3deg)}}
.page-header{padding:60px 24px 28px;text-align:center}
.page-header-badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:rgba(209,255,77,.08);border:1px solid rgba(209,255,77,.22);padding:6px 14px;border-radius:20px;margin-bottom:18px}
.page-title{font-size:clamp(2.4rem,10vw,3.4rem);font-weight:900;line-height:1.06;margin-bottom:14px;letter-spacing:-.03em}
.page-sub{font-size:.95rem;color:var(--muted);max-width:290px;margin:0 auto;line-height:1.72}
.accent{color:var(--accent)}
.cards-grid{display:flex;flex-direction:column;gap:14px;padding:0 16px 32px;max-width:520px;margin:0 auto}
.card{display:flex;flex-direction:row;align-items:stretch;background:rgba(255,255,255,.038);border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);text-decoration:none;color:var(--text);position:relative;overflow:hidden;min-height:148px;transition:transform .22s ease,box-shadow .22s ease,background .22s ease;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(16px)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;border-radius:var(--radius) var(--radius) 0 0;background:linear-gradient(to bottom,rgba(255,255,255,.055) 0%,transparent 100%);pointer-events:none;z-index:1}
.card:active{transform:scale(.985);box-shadow:0 4px 24px rgba(0,0,0,.3)}
@media(hover:hover){.card:hover{transform:translateY(-5px);background:rgba(255,255,255,.06);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 0 1.5px var(--card-color,rgba(255,255,255,.12)),0 0 40px -10px var(--card-color,transparent)}.card:hover .card-cta i{transform:translateX(4px)}}
.card-accent-line{position:absolute;left:0;top:16px;bottom:16px;width:3px;border-radius:2px;background:var(--card-color,rgba(255,255,255,.2));opacity:.7;z-index:3}
.card-body{flex:1;display:flex;flex-direction:column;padding:22px 16px 22px 22px;position:relative;z-index:4}
.card-cat{display:inline-flex;align-items:center;font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--card-color,var(--accent));background:color-mix(in srgb,var(--card-color,var(--accent)) 12%,transparent);border:1px solid color-mix(in srgb,var(--card-color,var(--accent)) 28%,transparent);padding:3px 9px;border-radius:20px;margin-bottom:10px;width:fit-content}
.card-name{font-size:1.18rem;font-weight:800;margin-bottom:7px;line-height:1.25;letter-spacing:-.02em}
.card-desc{font-size:.78rem;color:var(--muted);line-height:1.62;flex-grow:1;margin-bottom:16px}
.card-cta{display:inline-flex;align-items:center;gap:7px;font-size:.76rem;font-weight:700;color:var(--card-color,var(--accent));background:color-mix(in srgb,var(--card-color,var(--accent)) 13%,transparent);border:1px solid color-mix(in srgb,var(--card-color,var(--accent)) 30%,transparent);padding:9px 16px;border-radius:28px;width:fit-content;letter-spacing:.01em;transition:background .18s;min-height:38px}
.card-cta i{font-size:11px;transition:transform .2s ease}
.card-icon-area{width:136px;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:12px 14px 12px 4px;position:relative;z-index:4}
.icon-placeholder{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center;animation:iconFloat 3.5s ease-in-out infinite}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(0)}35%{transform:translateY(-7px) rotate(1.5deg)}65%{transform:translateY(-3px) rotate(-1deg)}}
.icon-glow{position:absolute;inset:8px;border-radius:50%;background:var(--card-color,rgba(255,255,255,.2));filter:blur(18px);opacity:.45;transition:opacity .22s}
.card:hover .icon-glow,.card:active .icon-glow{opacity:.7}
.icon-inner{position:relative;width:76px;height:76px;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:30px;color:#fff;box-shadow:0 8px 28px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.2)}
.icon-inner::after{content:'';position:absolute;top:0;left:0;right:0;height:42%;border-radius:22px 22px 0 0;background:linear-gradient(to bottom,rgba(255,255,255,.22) 0%,transparent 100%)}
.info-bar{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px 36px;max-width:520px;margin:0 auto}
.info-item{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:18px 14px;display:flex;flex-direction:column;align-items:flex-start;gap:5px;backdrop-filter:blur(12px)}
.info-item i{font-size:20px;color:var(--accent);margin-bottom:2px}
.info-item strong{font-size:.85rem;font-weight:700}
.info-item span{font-size:.72rem;color:var(--muted);line-height:1.45}
.site-footer{padding:28px 24px 56px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.footer-logo{height:36px;object-fit:contain;opacity:.7}
.footer-logo-text{font-size:1.2rem;font-weight:900;opacity:.7}
.footer-tagline{font-size:.85rem;color:var(--muted)}
.footer-heart{font-size:20px;color:#ff3b30}
@media(min-width:600px){
  .cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 20px 36px;max-width:720px}
  .card{flex-direction:column;min-height:unset}
  .card-body{padding:22px 20px 16px}
  .card-icon-area{width:100%;padding:0 20px 20px;justify-content:flex-start}
  .icon-placeholder{width:100px;height:100px}
  .icon-inner{width:88px;height:88px}
  .info-bar{grid-template-columns:repeat(4,1fr);max-width:720px;padding:0 20px 40px}
}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px}
.loading-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.9rem;color:var(--muted)}
.error-screen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;text-align:center;padding:24px}
.error-screen i{font-size:48px;color:rgba(255,77,109,.5);margin-bottom:8px}
.error-screen h2{font-size:1.4rem;font-weight:800}
.error-screen p{color:var(--muted);font-size:.9rem}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
  <p class="loading-text">Carregando...</p>
</div>

<div class="error-screen" id="error-screen">
  <i class="fas fa-exclamation-triangle"></i>
  <h2>Cliente não encontrado</h2>
  <p>O link bio que você está procurando não existe ou foi desativado.</p>
</div>

<div id="bg-layer"></div>
<div class="vignette"></div>
<div class="ambient-orb orb-1"></div>
<div class="ambient-orb orb-2"></div>
<div class="ambient-orb orb-3"></div>

<header id="main-header" style="opacity:0;pointer-events:none">
  <div id="header-logo-wrap"></div>
  <a href="#" class="header-cta" id="header-cta">Fale Conosco</a>
</header>

<section id="hero">
  <div class="floating-elements" id="particles"></div>
  <div class="logo-glow-bg"></div>
  <div class="logo-container" id="logo-container">
    <div id="logo-left-half" class="logo-half"></div>
    <div id="logo-right-half" class="logo-half"></div>
    <div class="glow-line" id="glow"></div>
  </div>
  <div id="portal-flash"></div>
  <div class="scroll-hint">Role para explorar<div class="chevron"><i class="fas fa-chevron-down"></i></div></div>
</section>

<div id="main-wrapper">
  <div class="top-reveal-area" id="top-reveal-area"></div>
  <div class="page-header" id="contacts-anchor">
    <div class="page-header-badge"><i class="fas fa-store"></i> Fale Conosco</div>
    <h2 class="page-title">Nossos <span class="accent" id="contacts-title">Contatos</span></h2>
    <p class="page-sub" id="contacts-sub">Escolha como deseja falar com a gente.</p>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="info-bar" id="info-bar" style="display:none"></div>
  <footer class="site-footer">
    <div id="footer-logo-wrap"></div>
    <p class="footer-tagline" id="footer-tagline">Feito com <span class="accent">♥</span></p>
    <i class="fas fa-heart footer-heart"></i>
  </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5Dxg6wrBGnB75mx-nyd0jQc8gSRBx4qQ",
  authDomain: "link-bio-6da09.firebaseapp.com",
  projectId: "link-bio-6da09",
  storageBucket: "link-bio-6da09.firebasestorage.app",
  messagingSenderId: "901664763233",
  appId: "1:901664763233:web:7e14ea4bb7f93f97dd2920"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const LINK_ICONS = {
  whatsapp: {icon:'fab fa-whatsapp', color:'#25d366', cat:'ATENDIMENTO', cta:'Falar no WhatsApp'},
  instagram: {icon:'fab fa-instagram', color:'#e1306c', cat:'REDES SOCIAIS', cta:'Seguir Agora'},
  phone: {icon:'fas fa-phone', color:'#f97316', cat:'TELEFONE', cta:'Ligar Agora'},
  maps: {icon:'fas fa-map-marker-alt', color:'#06b6d4', cat:'LOCALIZAÇÃO', cta:'Ver no Mapa'},
  website: {icon:'fas fa-globe', color:'#818cf8', cat:'SITE OFICIAL', cta:'Acessar Site'},
  group: {icon:'fas fa-users', color:'#3b82f6', cat:'PROMOÇÕES', cta:'Entrar no Grupo'},
  app: {icon:'fas fa-mobile-alt', color:'#60a5fa', cat:'APLICATIVO', cta:'Baixar Agora'},
  message: {icon:'fas fa-comment', color:'#2dd4bf', cat:'ATENDIMENTO', cta:'Enviar Mensagem'},
  email: {icon:'fas fa-envelope', color:'#f59e0b', cat:'E-MAIL', cta:'Enviar E-mail'},
};

async function loadClient() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('client');

  if (!slug) {
    showError();
    return;
  }

  try {
    const snap = await getDoc(doc(db, 'clients', slug));
    if (!snap.exists()) {
      showError(`O cliente "${slug}" não foi encontrado no banco de dados.`);
      return;
    }
    const data = snap.data();
    if (data.status !== 'active') {
      showError("Este link bio está desativado no momento.");
      return;
    }
    buildPage(data);
  } catch(e) {
    console.error("Erro ao carregar:", e);
    showError(`Erro de conexão com o Firebase: ${e.message}. Verifique se o banco de dados está em 'Modo Teste' ou se as regras permitem leitura pública.`);
  }
}

function showError(msg) {
  document.getElementById('loading-screen').style.display = 'none';
  const errorScreen = document.getElementById('error-screen');
  errorScreen.style.display = 'flex';
  if (msg) {
    errorScreen.querySelector('p').innerText = msg;
  }
}

function buildPage(data) {
  const accent = data.accentColor || '#d1ff4d';
  const bg = data.bgColor || '#020b1c';

  // CSS vars
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--bg', bg);
  document.title = data.name;

  // Header
  const headerLogoWrap = document.getElementById('header-logo-wrap');
  if (data.logo) {
    headerLogoWrap.innerHTML = `<img src="${data.logo}" alt="${data.name}" class="header-logo">`;
  } else {
    headerLogoWrap.innerHTML = `<span class="header-logo-text">${data.name}</span>`;
  }

  // Hero logo
  if (data.logo) {
    document.getElementById('logo-left-half').style.backgroundImage = `url('${data.logo}')`;
    document.getElementById('logo-right-half').style.backgroundImage = `url('${data.logo}')`;
  } else {
    // Text logo fallback
    const lc = document.getElementById('logo-container');
    lc.innerHTML = `
      <div id="logo-left-half" class="logo-half logo-text-hero" style="clip-path:inset(0 50% 0 0);font-size:clamp(1.8rem,7vw,2.8rem)">${data.name}</div>
      <div id="logo-right-half" class="logo-half logo-text-hero" style="clip-path:inset(0 0 0 50%);font-size:clamp(1.8rem,7vw,2.8rem)">${data.name}</div>
      <div class="glow-line" id="glow"></div>
    `;
  }

  // Reveal logo
  const topReveal = document.getElementById('top-reveal-area');
  if (data.logo) {
    topReveal.innerHTML = `<img src="${data.logo}" alt="${data.name}" class="reveal-logo">`;
  } else {
    topReveal.innerHTML = `<div class="reveal-logo-text" style="color:${accent}">${data.name}</div>`;
  }

  // Footer
  const footerLogoWrap = document.getElementById('footer-logo-wrap');
  if (data.logo) {
    footerLogoWrap.innerHTML = `<img src="${data.logo}" alt="${data.name}" class="footer-logo">`;
  } else {
    footerLogoWrap.innerHTML = `<div class="footer-logo-text">${data.name}</div>`;
  }

  // Description
  if (data.description) {
    document.getElementById('contacts-sub').textContent = data.description;
    document.getElementById('footer-tagline').innerHTML = `${data.description}`;
  }

  // CTA header
  const wLink = (data.links||[]).find(l => l.type === 'whatsapp');
  if (wLink) document.getElementById('header-cta').href = wLink.url;

  // Cards
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = (data.links||[]).map((link, i) => {
    const info = LINK_ICONS[link.type] || {icon:'fas fa-link', color: accent, cat:'LINK', cta:'Acessar'};
    const delay = (i % 2) * 60;
    return `
      <a href="${link.url}" class="card" target="_blank" rel="noopener" style="--card-color:${info.color}">
        <div class="card-accent-line"></div>
        <div class="card-body">
          <span class="card-cat">${info.cat}</span>
          <h3 class="card-name">${link.label}</h3>
          <p class="card-desc">${getDesc(link.type)}</p>
          <span class="card-cta">${info.cta} <i class="fas fa-arrow-right"></i></span>
        </div>
        <div class="card-icon-area" style="animation-delay:-${delay}ms">
          <div class="icon-placeholder">
            <div class="icon-glow"></div>
            <div class="icon-inner" style="background:linear-gradient(145deg,${info.color}cc,${info.color}88)">
              <i class="${info.icon}"></i>
            </div>
          </div>
        </div>
      </a>
    `;
  }).join('');

  document.getElementById('loading-screen').style.display = 'none';
  initAnimations();
}

function getDesc(type) {
  const descs = {
    whatsapp: 'Fale com nossa equipe e receba as melhores ofertas.',
    instagram: 'Acompanhe novidades e promoções nas nossas redes.',
    phone: 'Fale diretamente com nossa equipe por telefone.',
    maps: 'Veja no mapa onde estamos e encontre o caminho.',
    website: 'Visite nosso site e confira o catálogo completo.',
    group: 'Entre no grupo e receba promoções exclusivas.',
    app: 'Baixe nosso aplicativo para iOS e Android.',
    message: 'Envie uma mensagem para nossa equipe.',
    email: 'Mande um e-mail para nossa equipe.',
  };
  return descs[type] || 'Acesse este link para mais informações.';
}

function initAnimations() {
  gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  // Particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    const size = Math.random() * 5 + 2;
    const colors = ['rgba(80,160,255,0.5)','rgba(120,200,255,0.4)','rgba(180,220,255,0.35)','rgba(100,180,255,0.45)','rgba(209,255,77,0.25)'];
    el.style.cssText = `position:absolute;left:${Math.random()*90+5}%;top:${Math.random()*90+5}%;width:${size}px;height:${size}px;border-radius:50%;background:${colors[Math.floor(Math.random()*colors.length)]};opacity:0`;
    container.appendChild(el);
    gsap.to(el, {opacity:1, duration:.8, delay:Math.random()*1.5});
    gsap.to(el, {y:'random(-30,30)',x:'random(-20,20)',duration:'random(4,8)',repeat:-1,yoyo:true,ease:'sine.inOut',delay:Math.random()*3});
  }

  // Logo float
  let floatAnim = gsap.to('#logo-container', {y:-10,rotation:.5,duration:2.5,repeat:-1,yoyo:true,ease:'sine.inOut'});

  const tl = gsap.timeline({paused:true, onComplete: () => {
    document.body.style.overflow = 'auto';
    gsap.to(window, {scrollTo:{y:'#contacts-anchor',autoKill:false},duration:3.5,ease:'power1.inOut',delay:.2});
  }});

  gsap.set('#portal-flash', {opacity:0});
  gsap.set('#glow', {opacity:0});
  gsap.set('#main-wrapper', {opacity:0,y:100});
  gsap.set('#main-header', {opacity:0,y:-20,pointerEvents:'none'});
  gsap.set(['#logo-left-half','#logo-right-half'], {filter:'brightness(1) saturate(1)'});

  tl.to('.scroll-hint', {opacity:0,y:20,duration:.3,ease:'power2.in'})
    .to('.logo-glow-bg', {scale:2,opacity:1,duration:.6,ease:'power2.inOut'}, 0)
    .to('#logo-container', {scale:1.15,duration:.6,ease:'power1.inOut'}, 0)
    .to('#logo-container', {scale:80,duration:1.2,ease:'power4.in'}, .6)
    .to(['#logo-left-half','#logo-right-half'], {filter:'brightness(2.5) saturate(1.5)',duration:.8,ease:'power2.in'}, .6)
    .to('#glow', {opacity:1,duration:.15,ease:'none'}, 1.6)
    .to('#portal-flash', {opacity:1,duration:.1,ease:'power4.in'}, 1.7)
    .to('#logo-left-half', {x:'-250vw',rotate:-20,duration:1.2,ease:'power3.inOut'}, 1.7)
    .to('#logo-right-half', {x:'250vw',rotate:20,duration:1.2,ease:'power3.inOut'}, 1.7)
    .to('#hero', {opacity:0,duration:.8,ease:'power2.inOut', onStart:()=>gsap.set('#main-wrapper',{opacity:1})}, 2.2)
    .to('#main-wrapper', {y:0,duration:1.2,ease:'power3.out'}, 2.3)
    .to('#main-header', {opacity:1,y:0,pointerEvents:'auto',duration:.8,ease:'power2.out'}, 2.5)
    .to('#portal-flash', {opacity:0,duration:1.2,ease:'power2.out'}, 2.2)
    .set('#hero', {display:'none'});

  let played = false;
  function play() {
    if(played) return;
    played = true;
    floatAnim.kill();
    tl.play();
  }

  document.body.style.overflow = 'hidden';
  window.addEventListener('wheel', e => { if(e.deltaY>0) play(); }, {passive:true});
  let ty = 0;
  window.addEventListener('touchstart', e => { ty = e.touches[0].clientY; }, {passive:true});
  window.addEventListener('touchmove', e => { if(ty - e.touches[0].clientY > 20) play(); }, {passive:true});
  window.addEventListener('scroll', () => { if(window.scrollY>5) play(); }, {passive:true});
  document.getElementById('hero').addEventListener('click', play);

  // Card animations
  document.querySelectorAll('.card').forEach((card, i) => {
    gsap.from(card, {
      scrollTrigger:{trigger:card,start:'top 90%'},
      opacity:0,y:28,duration:.45,delay:(i%2)*.06,ease:'power2.out'
    });
  });
}

loadClient();
</script>
</body>
</html>
